        <h2>Our Contact Form</h2>
        <form action="https://httpbin.org/get" method="get">
                    <fieldset>
                        <legend>Send Us A Message</legend>
                    <p>
                       <label for="firstName">Name:</label>
                      <input type="text" name= "firstName" id="firstName"  placeholder="jane" autocomplete="on" required>
                    </p>
                    
                    <p>
                 <label for="email">Email:</label>
                    <input type="email" name= "email" id="email"  placeholder="jane@doe.com" autocomplete="on" required>
                    </p>

                    
                        <div>
                            <label for="message">Your Message:</label>
                        </div>
                        <div>
                            <textarea name="your message" id="message" cols="30" rows="10" placeholder="Your message here..."></textarea>
                        </div>
                    </fieldset>

                    <button type="submit">Submit</button>
                   
                    <button type="reset">Reset</button>
                </form>
